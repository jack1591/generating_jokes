<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Генератор анекдотов</title>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #1a1a22;
    --surface-hover: #22222e;
    --accent: #f0c040;
    --accent-dim: #f0c04018;
    --text: #e8e6e0;
    --text-muted: #8a8890;
    --user-bubble: #2a2540;
    --bot-bubble: #1e1e28;
    --border: #2a2a35;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Geologica', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .header-icon {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 12px;
    display: grid;
    place-items: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .header-title {
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.3px;
  }

  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 2px;
  }

  .settings-row {
    margin-left: auto;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
  }

  .setting-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .setting-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .setting-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 5px 10px;
    font-family: inherit;
    font-size: 13px;
    width: 70px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }

  .setting-input:focus {
    border-color: var(--accent);
  }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .welcome {
    text-align: center;
    margin: auto;
    max-width: 380px;
    animation: fadeUp 0.6s ease;
  }

  .welcome-emoji {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }

  .welcome h2 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.6;
    font-weight: 300;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: var(--accent);
  }

  /* Messages */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeUp 0.35s ease;
  }

  .msg.user { align-self: flex-end; }
  .msg.bot { align-self: flex-start; }

  .msg-sender {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 5px;
    padding: 0 4px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .msg.user .msg-sender { text-align: right; }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.65;
    font-size: 14px;
    font-weight: 300;
  }

  .msg.user .msg-bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }

  .msg.bot .msg-bubble {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .joke-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
    padding-left: 28px;
  }

  .joke-item:last-child { border-bottom: none; padding-bottom: 0; }
  .joke-item:first-child { padding-top: 0; }

  .joke-num {
    position: absolute;
    left: 0;
    top: 10px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    width: 20px;
    text-align: center;
  }

  .joke-item:first-child .joke-num { top: 0; }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    padding: 8px 0;
    align-items: center;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: typingBounce 1.2s ease infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 6px 18px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
  }

  .input-row input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    font-weight: 300;
    outline: none;
    padding: 8px 0;
  }

  .input-row input::placeholder {
    color: var(--text-muted);
  }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: var(--bg);
  }

  .input-hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
    font-weight: 300;
  }

  .error-toast {
    background: #3a1520;
    border: 1px solid #6a2535;
    color: #f0a0a0;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 13px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  @media (max-width: 600px) {
    .settings-row { display: none; }
    .msg { max-width: 92%; }
    .chat { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🎭</div>
  <div>
    <div class="header-title">Генератор анекдотов</div>
    <div class="header-sub">RNN-модель на PyTorch</div>
  </div>
  <div class="settings-row">
    <div class="setting-group">
      <span class="setting-label">Кол-во</span>
      <input class="setting-input" type="number" id="count" value="5" min="1" max="20">
    </div>
    <div class="setting-group">
      <span class="setting-label">Темп.</span>
      <input class="setting-input" type="number" id="temperature" value="0.5" min="0.1" max="2" step="0.1">
    </div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <span class="welcome-emoji">🎪</span>
    <h2>Начните анекдот</h2>
    <p>Напишите начало — модель придумает продолжение. Чем выше температура, тем безумнее результат.</p>
    <div class="chips">
      <button class="chip" onclick="useChip(this)">Приходит как-то</button>
      <button class="chip" onclick="useChip(this)">Штирлиц</button>
      <button class="chip" onclick="useChip(this)">Встречаются два</button>
      <button class="chip" onclick="useChip(this)">Почему</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="prompt" placeholder="Начните анекдот..." autocomplete="off">
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter — отправить</div>
</div>

<script>
const API_BASE = '';

const chat = document.getElementById('chat');
const input = document.getElementById('prompt');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

function useChip(el) {
  input.value = el.textContent;
  send();
}

function addMessage(role, content) {
  if (welcome) welcome.remove();

  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = role === 'user' ? 'Вы' : 'Модель';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = content;

  msg.appendChild(sender);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addTyping() {
  if (welcome) welcome.remove();

  const msg = document.createElement('div');
  msg.className = 'msg bot';
  msg.id = 'typing-msg';

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = 'Модель';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = `<div class="typing">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>`;

  msg.appendChild(sender);
  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  const count = parseInt(document.getElementById('count').value) || 5;
  const temperature = parseFloat(document.getElementById('temperature').value) || 0.5;

  input.value = '';
  sendBtn.disabled = true;
  addMessage('user', escapeHtml(text));
  addTyping();

  try {
    const params = new URLSearchParams({ prompt: text, count, temperature });
    const res = await fetch(`${API_BASE}/jokes?${params}`);

    if (!res.ok) throw new Error(`Ошибка сервера: ${res.status}`);

    const data = await res.json();
    removeTyping();

    const jokes = data.jokes || [];
    if (jokes.length === 0) {
      addMessage('bot', '<span style="color:var(--text-muted)">Модель не смогла сгенерировать анекдот. Попробуйте другой запрос.</span>');
    } else {
      const html = jokes.map((joke, i) =>
        `<div class="joke-item"><span class="joke-num">${i + 1}</span>${escapeHtml(joke)}</div>`
      ).join('');
      addMessage('bot', html);
    }
  } catch (err) {
    removeTyping();
    addMessage('bot', `<div class="error-toast">Не удалось получить ответ. Убедитесь, что сервер запущен на <b>${API_BASE}</b></div>`);
  }

  sendBtn.disabled = false;
  input.focus();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
